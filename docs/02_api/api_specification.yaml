openapi: 3.0.0
info:
  title: Coffee Shop Order System API
  description: API для управления заказами в сети кофеен "Кофеин"
  version: 1.0.0

servers:
  - url: https://api.coffee-shop.ru/v1
    description: Production server

paths:
  /orders:
    post:
      summary: Создать новый заказ
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
      responses:
        '201':
          description: Заказ успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Неверные данные
        '500':
          description: Внутренняя ошибка сервера

  /orders/{orderId}:
    get:
      summary: Получить заказ по ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Заказ не найден

  /orders/{orderId}/status:
    patch:
      summary: Обновить статус заказа
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [new, paid, in_progress, ready, completed]
      responses:
        '200':
          description: Статус обновлен

components:
  schemas:
    OrderInput:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemInput'
        payment_method:
          type: string
          enum: [card, cash, online]
          default: card

    OrderItemInput:
      type: object
      required:
        - product_id
        - quantity
      properties:
        product_id:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        total_amount:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        payment:
          $ref: '#/components/schemas/Payment'

    OrderItem:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        product_name:
          type: string
        quantity:
          type: integer
        price:
          type: number
          format: float

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        amount:
          type: number
          format: float
        method:
          type: string
        status:
          type: string
        paid_at:
          type: string
          format: date-time